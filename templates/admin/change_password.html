{% extends 'admin/base_admin.html' %}
{% block title %}Şifre Değiştir{% endblock %}
{% block page_title %}Şifre Değiştir{% endblock %}

{% block content %}
<div class="card" style="max-width:480px;">
  <div class="card-header">
    <h2><i class="fa-solid fa-key"></i> Şifre Değiştir</h2>
  </div>
  <form method="POST" action="{{ url_for('admin_change_password') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
      <label>Mevcut Şifre</label>
      <input type="password" name="current_password" required placeholder="Mevcut şifreniz">
    </div>
    <div class="form-row">
      <label>Yeni Şifre</label>
      <input type="password" name="new_password" required minlength="8" placeholder="En az 8 karakter">
    </div>
    <div class="form-row">
      <label>Yeni Şifre (Tekrar)</label>
      <input type="password" name="new_password2" required minlength="8" placeholder="Yeni şifreyi tekrar girin">
    </div>
    <button type="submit" class="btn btn-primary">
      <i class="fa-solid fa-floppy-disk"></i> Şifreyi Güncelle
    </button>
  </form>
</div>
{% endblock %}

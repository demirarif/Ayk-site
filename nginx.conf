# Nginx Konfigürasyonu — KYA Hukuk Danışmanlık
# NOT: Bu konfigürasyon Vercel kullanmak yerine VPS/sunucu tercih ederseniz geçerlidir.
# Dosya yolu: /etc/nginx/sites-available/kyahukuk
# Etkinleştirme: sudo ln -s /etc/nginx/sites-available/kyahukuk /etc/nginx/sites-enabled/
# Test + yenile: sudo nginx -t && sudo systemctl reload nginx

upstream kya_app {
    server 127.0.0.1:5000;
}

# Ana domain → Public site
server {
    listen 80;
    server_name kyahukukdanismanlik.site www.kyahukukdanismanlik.site;

    # HTTPS yönlendirmesi (Certbot sonrası aktif edin):
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/KYA-Hukuk/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        proxy_pass http://kya_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin subdomain → /admin/* rotaları
server {
    listen 80;
    server_name admin.kyahukukdanismanlik.site;

    # HTTPS yönlendirmesi (Certbot sonrası aktif edin):
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/KYA-Hukuk/static/;
        expires 30d;
    }

    location / {
        proxy_pass http://kya_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── SSL/HTTPS (Certbot komutu) ───────────────────────────────────────
# sudo certbot --nginx \
#   -d kyahukukdanismanlik.site \
#   -d www.kyahukukdanismanlik.site \
#   -d admin.kyahukukdanismanlik.site


upstream kya_app {
    server 127.0.0.1:5000;
}

# Ana domain → Public site
server {
    listen 80;
    server_name kyahukuk.com www.kyahukuk.com;

    # HTTPS yönlendirmesi (Certbot sonrası)
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/KYA-Hukuk/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        proxy_pass http://kya_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin subdomain → /admin/* rotaları
server {
    listen 80;
    server_name admin.kyahukuk.com;

    # HTTPS yönlendirmesi (Certbot sonrası)
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/KYA-Hukuk/static/;
        expires 30d;
    }

    location / {
        rewrite ^/(.*)$ /admin/$1 break;
        proxy_pass http://kya_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /admin login sayfası doğrudan erişim
    location = / {
        proxy_pass http://kya_app/admin/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ─── HTTPS Blokları (Certbot sonrası aşağıdaki komutla otomatik oluşur) ───
# sudo certbot --nginx -d kyahukuk.com -d www.kyahukuk.com -d admin.kyahukuk.com
